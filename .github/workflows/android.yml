name: Build APK

# Se ejecuta al subir cambios o manualmente desde la pestaña "Actions"
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes del SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Versión automática (según nº de compilación)
        working-directory: android
        run: |
          VER="1.0.${GITHUB_RUN_NUMBER}"
          echo "APP_VER=$VER" >> $GITHUB_ENV
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VER}\"/" app/build.gradle
          sed -i "s/versionCode [0-9]\+/versionCode ${GITHUB_RUN_NUMBER}/" app/build.gradle
          sed -i "s/const APP_VERSION   = \"[^\"]*\"/const APP_VERSION   = \"${VER}\"/" app/src/main/assets/index.html
          echo "Compilando versión $VER"

      - name: Compilar APK (debug)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publicar el APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: StreamView-APK-v${{ env.APP_VER }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
